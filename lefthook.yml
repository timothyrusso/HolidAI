pre-commit:
  parallel: true
  commands:
    lint:
      files: git diff --name-only --cached --diff-filter=d
      glob: "*.{js,jsx,ts,tsx}"
      run: npx @biomejs/biome check --no-errors-on-unmatched {files}
    format:
      files: git diff --name-only --cached --diff-filter=d
      glob: "*.{js,jsx,ts,tsx}"
      run: npx @biomejs/biome format --write {files}

commit-msg:
  parallel: true
  commands:
    lint-commit-msg:
      run: npx --no-install commitlint --config .commitlint.cjs --edit {1}
    spell-check:
      run: npx cspell --no-summary {1}
    validate-parentheses:
      run: |
        COMMIT_MSG=$(cat {1})
        OPEN_COUNT=$(echo "$COMMIT_MSG" | tr -cd '(' | wc -c)
        CLOSE_COUNT=$(echo "$COMMIT_MSG" | tr -cd ')' | wc -c)
        if [ "$OPEN_COUNT" -gt 1 ] || [ "$CLOSE_COUNT" -gt 1 ]; then
          echo "❌ Commit message must contain at most one '(' and one ')'"
          echo "   Got: $COMMIT_MSG"
          echo "   Example: feat(200): your description"
          exit 1
        fi