pre-commit:
  parallel: true
  commands:
    lint:
      files: git diff --name-only --cached --diff-filter=d
      glob: "*.{js,jsx,ts,tsx}"
      run: npx @biomejs/biome check --no-errors-on-unmatched {files}
    format:
      files: git diff --name-only --cached --diff-filter=d
      glob: "*.{js,jsx,ts,tsx}"
      run: npx @biomejs/biome format --write {files}
    no-relative-imports:
      files: git diff --name-only --cached --diff-filter=d
      glob: "*.{ts,tsx}"
      exclude: "^convex/"
      run: |
        if grep -En "from ['\"](\./|\.\./).*['\"]" {files} 2>/dev/null; then
          echo "Relative imports are not allowed. Use @/ aliases instead."
          exit 1
        fi

commit-msg:
  parallel: true
  commands:
    lint-commit-msg:
      run: npx --no-install commitlint --config .commitlint.cjs --edit {1}
    spell-check:
      run: npx cspell --no-summary {1}
    validate-issue-number:
      run: |
        COMMIT_MSG=$(cat {1})
        if ! echo "$COMMIT_MSG" | grep -qE '^[a-z]+\([0-9]+\): .+'; then
          echo "❌ Commit message must include a GitHub issue number."
          echo "   Got: $COMMIT_MSG"
          echo "   Example: feat(200): your description"
          exit 1
        fi